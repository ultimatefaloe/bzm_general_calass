<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List Docs</title>
  </head>
  <body>
    <h1>Working with list</h1>

    <hr />
    
    <!-- this is unorder list -->
    <h2>Unorder List</h2>
    <ul>
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
    </ul>

    <hr />

    <!-- This is an order list  -->
    <ol>
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
    </ol>

    <hr />

    <!-- Definition List -->
    <dl>
      <dt>HTML</dt>
      <dd>Hyper Text Markup Language</dd>

      <dt>CSS</dt>
      <dd>Cascading StyleSheet</dd>
    </dl>

    <hr />

  </body>
</html>
